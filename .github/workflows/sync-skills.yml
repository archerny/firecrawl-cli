name: Sync Firecrawl Skill to Cursor Plugin

on:
  push:
    branches: [main]
    paths:
      - 'skills/firecrawl-cli/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: cli

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: firecrawl/firecrawl-cursor-plugin
          token: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
          path: target

      - name: Copy firecrawl skill
        run: |
          rm -rf target/skills/firecrawl
          mkdir -p target/skills/firecrawl
          cp -R cli/skills/firecrawl-cli/. target/skills/firecrawl/

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
        run: |
          cd target
          BRANCH="sync/cursor-skill-${{ github.sha }}"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync firecrawl skill from firecrawl/cli"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo firecrawl/firecrawl-cursor-plugin \
            --title "Sync firecrawl skill from firecrawl/cli" \
            --body "Automated sync of \`skills/firecrawl-cli\` from firecrawl/cli into \`skills/firecrawl\`." \
            --base main \
            --head "$BRANCH")
          echo "Created PR: $PR_URL"
          gh pr merge --repo firecrawl/firecrawl-cursor-plugin --auto --merge --delete-branch "$PR_URL"
