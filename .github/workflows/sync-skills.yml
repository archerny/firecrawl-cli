name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Clone target repo
        env:
          TOKEN: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/firecrawl/skills-gh-action-test.git target 2>/dev/null || {
            mkdir target && cd target && git init
            git remote add origin https://x-access-token:${TOKEN}@github.com/firecrawl/skills-gh-action-test.git
          }

      - name: Sync skills
        env:
          GH_TOKEN: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy skills
          rm -rf skills
          cp -r ../cli/skills skills

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          # Check if repo has any commits
          if ! git rev-parse HEAD >/dev/null 2>&1; then
            # First sync — bootstrap main branch
            git checkout -b main
            git commit -m "sync skills from firecrawl/cli (${SHORT_SHA})"
            git push origin main
          else
            # Subsequent syncs — PR workflow
            BRANCH="sync/skills-${SHORT_SHA}"
            git checkout -b "$BRANCH"
            git commit -m "sync skills from firecrawl/cli (${SHORT_SHA})"
            git push origin "$BRANCH"
            PR_URL=$(gh pr create \
              --repo firecrawl/skills-gh-action-test \
              --title "sync skills (${SHORT_SHA})" \
              --body "Automated sync from [firecrawl/cli@${SHORT_SHA}](${COMMIT_URL})." \
              --base main \
              --head "$BRANCH")
            echo "Created PR: $PR_URL"
            gh pr merge --repo firecrawl/skills-gh-action-test --auto --merge --delete-branch "$PR_URL"
          fi
